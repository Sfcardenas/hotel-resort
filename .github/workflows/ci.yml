
name: Pipeline de Calidad Hotel
on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar mi código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar ingredientes
        run: npm install

      - name: Ejecutar el Inspector (Tests)
        run: npm test
